name: Helvetra

options:
  bundleIdPrefix: ch.helvetra
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: true
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Helvetra:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/Helvetra
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.helvetra.app
        INFOPLIST_FILE: Sources/Helvetra/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        CODE_SIGN_ENTITLEMENTS: Sources/Helvetra/Resources/Helvetra.entitlements
    info:
      path: Sources/Helvetra/Resources/Info.plist
      properties:
        CFBundleDisplayName: Helvetra
        CFBundleName: Helvetra
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sources/Helvetra/Resources/Helvetra.entitlements
      properties: {}

schemes:
  Helvetra:
    build:
      targets:
        Helvetra: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
